version: '3.8'

# Total-Recall — Portable Standalone Deployment
# ===============================================
# HTTP transport on configurable port. All paths are env-var-configurable
# with sensible defaults — no hardcoded host paths.
#
# Usage:
#   cp .env.example .env   # optional: edit to override defaults
#   docker compose up --build
#
# Validate:
#   curl -X POST http://localhost:8811/mcp \
#     -H 'Content-Type: application/json' \
#     -H 'Accept: application/json, text/event-stream' \
#     -H 'MCP-Protocol-Version: 2025-06-18' \
#     -d '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-06-18","capabilities":{},"clientInfo":{"name":"test","version":"0.1"}}}'
#
# For a production deployment with fixed paths see: docker-compose.hyper01.yml

services:
  total-recall:
    build: .
    container_name: total-recall
    restart: unless-stopped
    command: ["serve", "--transport", "http", "--port", "${TR_PORT:-8811}", "--host", "0.0.0.0"]
    ports:
      - "${TR_PORT:-8811}:${TR_PORT:-8811}"
    volumes:
      - ${TR_MEMORY_DIR:-~/.total-recall/memory}:/data/memory
      - ${TR_MODEL_CACHE_DIR:-~/.total-recall/models}:/data/models
    environment:
      - TR_MEMORY_DIR=/data/memory
      - TR_MODEL_CACHE_DIR=/data/models
