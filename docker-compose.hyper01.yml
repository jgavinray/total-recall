# Total-Recall — hyper01 production deployment
# ============================================
# Streamable HTTP transport on port 8811 (/mcp endpoint)
# Data persisted to /archive/zoidberg/total-recall on host.
#
# Prerequisites:
#   sudo mkdir -p /archive/zoidberg/total-recall/memory /archive/zoidberg/total-recall/models
#   sudo chown -R zoidberg:zoidberg /archive/zoidberg/total-recall
#   docker build -f Dockerfile -t total-recall:latest .
#
# Start:
#   docker compose -f docker-compose.hyper01.yml up -d
#
# Validate:
#   curl -X POST http://192.168.0.44:8811/mcp \
#     -H 'Content-Type: application/json' \
#     -H 'Accept: application/json, text/event-stream' \
#     -H 'MCP-Protocol-Version: 2025-06-18' \
#     -d '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-06-18","capabilities":{},"clientInfo":{"name":"test","version":"0.1"}}}'

services:
  total-recall:
    image: total-recall:latest
    container_name: total-recall
    restart: unless-stopped

    command: ["serve", "--transport", "http", "--port", "8811", "--host", "0.0.0.0"]

    ports:
      - "8811:8811"

    environment:
      # Config file path inside container
      TOTAL_RECALL_CONFIG: /data/config.yaml
      # Model cache — maps to config.embedding.cache_dir
      TR_MODEL_CACHE_DIR: /data/models
      # Log level
      RUST_LOG: "total_recall=info"

    volumes:
      # Memory directory — daily Markdown notes and SQLite index
      - /archive/zoidberg/total-recall/memory:/data/memory
      # Model cache — ONNX embedding model (survives container restarts)
      - /archive/zoidberg/total-recall/models:/data/models
      # Config
      - /archive/zoidberg/total-recall/config.yaml:/data/config.yaml:ro
