# Total-Recall — hyper01 production deployment
# ============================================
# Data persisted to /archive/zoidberg/total-recall on host.
# MCP proxy on port 8811 for network-accessible MCP access.
#
# Prerequisites:
#   sudo mkdir -p /archive/zoidberg/total-recall/memory /archive/zoidberg/total-recall/models
#   sudo chown -R jgavinray:jgavinray /archive/zoidberg/total-recall
#   docker build -t total-recall:latest .
#
# Start:
#   docker compose -f docker-compose.hyper01.yml up -d
#
# Validate:
#   docker exec total-recall /app/total-recall write "deployment test"
#   docker exec total-recall /app/total-recall recent
#   ls /archive/zoidberg/total-recall/memory/

services:
  total-recall:
    image: total-recall:latest
    container_name: total-recall
    restart: unless-stopped

    environment:
      # Config file path inside container
      TOTAL_RECALL_CONFIG: /data/config.yaml
      # Suppress verbose tracing
      RUST_LOG: "off"

    volumes:
      # Memory directory — daily Markdown notes and SQLite index
      - /archive/zoidberg/total-recall/memory:/data/memory
      # Model cache — ONNX embedding model
      - /archive/zoidberg/total-recall/models:/data/models

    # total-recall is a stdio MCP server.
    # For network-accessible MCP, wrap with mcp-proxy (see below).
    # docker exec -i total-recall /app/total-recall serve  <-- stdio passthrough

    # Keep container alive even when not actively serving MCP
    # (CLI subcommands exec into it on demand)
    entrypoint: ["/bin/sh", "-c"]
    command: ["sleep infinity"]

  # mcp-proxy — exposes total-recall's stdio MCP server over HTTP/SSE on port 8811
  # Install on host: pip install mcp-proxy
  # Or run as a separate Docker service if mcp-proxy has a container image.
  # This service is optional — remove if using docker exec only.
  #
  # total-recall-mcp-proxy:
  #   image: python:3.11-slim
  #   container_name: total-recall-mcp-proxy
  #   restart: unless-stopped
  #   ports:
  #     - "8811:8811"
  #   command: >
  #     sh -c "pip install mcp-proxy &&
  #            mcp-proxy --port 8811 --
  #            docker exec -i total-recall /app/total-recall serve"
  #   depends_on:
  #     - total-recall
