# Total-Recall config for hyper01 production deployment
# ======================================================
# Deploy: copy to /archive/zoidberg/total-recall/config.yaml on hyper01

# Memory directory (inside container) — bind-mounted from host
memory_dir: /data/memory

# SQLite database path
db_path: /data/memory/memory.db

# Logging
logging:
  level: warn
  file: /data/memory/logs/server.log
  max_size_mb: 10
  backup_count: 3

# Embedding model — cached from HuggingFace
embedding:
  model: sentence-transformers/all-MiniLM-L6-v2
  dimension: 384
  cache_dir: /data/models

# Search settings
search:
  default_limit: 10
  max_limit: 100
  similarity_threshold: 0.7

# MCP server settings
mcp:
  enabled: true
  stdio: true
  timeout_seconds: 30
